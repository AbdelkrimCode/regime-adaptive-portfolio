hmm:
  n_states: 4
  n_iter: 2000
  n_init: 10
  random_state: 42
  min_train_days: 252
  retrain_frequency: "QS"
  n_jobs: 1

backtest:
  initial_capital: 1.0
  transaction_cost: 0.0002

optimizer:
  safe_haven_assets: ["IEF", "TLT", "GLD"]

paths:
  features: "data/processed/features.parquet"
  returns: "data/processed/returns.parquet"
  model: "models/hmm_model.joblib"
  regimes: "data/regimes.parquet"
  backtest_results: "data/backtest_results.parquet"
  charts: "data/charts.png"

evaluation:
  train_end: "2018-12-31"
  test_start: "2019-01-01"

market:
  risk_free_rate: 0.04
  trading_days: 252
  
subperiods:
  "GFC (2008-2009)":
    start: "2008-01-01"
    end:   "2009-12-31"
  "Low-vol bull (2013-2019)":
    start: "2013-01-01"
    end:   "2019-12-31"
  "COVID+rates (2020-2024)":
    start: "2020-01-01"
    end:   "2024-12-31"
    
stress_test:
  n_simulations: 1000
  confidence: 0.95
  vix_threshold: 30.0